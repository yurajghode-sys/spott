<!DOCTYPE html>
<html>
<head>
    <title>Frontend-Backend Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Frontend-Backend Connection Test</h1>
    <div id="results"></div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000/api';
        const results = document.getElementById('results');

        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.innerHTML = message;
            results.appendChild(div);
        }

        async function testConnection() {
            addResult('🔄 Testing frontend-backend connection...', 'info');

            try {
                // Test 1: Basic API connectivity
                addResult('📡 Testing API connectivity...', 'info');
                const response = await fetch(`${API_BASE}/events`);
                const data = await response.json();

                if (response.ok && data.success) {
                    addResult(`✅ API connected! Status: ${response.status}`, 'success');
                    addResult(`📊 Events loaded: ${data.data.length}`, 'success');

                    if (data.data.length > 0) {
                        addResult(`🎯 Sample event: "${data.data[0].title}"`, 'success');
                    }

                    // Test 2: CORS check
                    const corsHeaders = response.headers.get('Access-Control-Allow-Origin');
                    if (corsHeaders) {
                        addResult(`🌐 CORS enabled: ${corsHeaders}`, 'success');
                    } else {
                        addResult('❌ CORS headers missing', 'error');
                    }

                    // Test 3: Authentication endpoint
                    addResult('🔐 Testing auth endpoint...', 'info');
                    const authResponse = await fetch(`${API_BASE}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: 'user@spott.app', password: 'User@1234' })
                    });

                    if (authResponse.ok) {
                        const authData = await authResponse.json();
                        if (authData.success && authData.data.token) {
                            addResult('✅ Authentication working', 'success');
                            addResult(`🎫 Token received: ${authData.data.token.substring(0, 20)}...`, 'success');
                        } else {
                            addResult('❌ Auth response invalid', 'error');
                        }
                    } else {
                        addResult(`❌ Auth failed: ${authResponse.status}`, 'error');
                    }

                } else {
                    addResult(`❌ API error: ${response.status} - ${data.error || 'Unknown error'}`, 'error');
                }

            } catch (error) {
                addResult(`❌ Connection failed: ${error.message}`, 'error');
                console.error('Connection test error:', error);
            }

            addResult('🏁 Connection test complete', 'info');
        }

        // Run the test when page loads
        testConnection();
    </script>
</body>
</html>
